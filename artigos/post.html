<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large">
<title id="page-title">Artigo. Leandro Manique</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="author" content="Leandro Manique">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0a0e14;
    --bg-card: #0f1318;
    --bg-code: #131820;
    --text-primary: #f0ede8;
    --text-secondary: #8a8d94;
    --text-muted: #4a4d54;
    --accent: #4B69A6;
    --accent-bright: #6486C7;
    --border: #1c2028;
    --border-hover: #252b35;
    --font-display: 'Space Grotesk', -apple-system, sans-serif;
    --font-body: 'DM Sans', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 16px; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    line-height: 1.7;
    overflow-x: hidden;
  }
  ::selection { background: var(--accent); color: #fff; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 1.25rem 2rem;
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(10, 14, 20, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-brand { display: flex; align-items: center; gap: 0.6rem; }
  .nav-logo {
    font-family: var(--font-mono); font-size: 0.9rem; font-weight: 500;
    letter-spacing: 0.15em; color: var(--text-primary); text-decoration: none;
  }
  .nav-logo span { color: var(--accent); }
  .nav-section {
    font-family: var(--font-mono); font-size: 0.78rem; letter-spacing: 0.08em;
    color: var(--text-muted); text-decoration: none; transition: color 0.2s;
  }
  .nav-section:hover { color: var(--accent); }
  .nav-cta {
    font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.1em;
    color: #fff; background: var(--accent);
    padding: 0.55rem 1.25rem; text-decoration: none;
    text-transform: uppercase; transition: opacity 0.2s, transform 0.15s;
  }
  .nav-cta:hover { opacity: 0.85; transform: translateY(-1px); }

  main {
    max-width: 680px; margin: 0 auto;
    padding: 7rem 2rem 4rem;
  }

  .back-link {
    font-family: var(--font-mono); font-size: 0.72rem;
    letter-spacing: 0.15em; color: var(--text-muted);
    text-decoration: none; text-transform: uppercase;
    display: inline-block; margin-bottom: 2rem;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--accent-bright); }

  .post-meta {
    font-family: var(--font-mono); font-size: 0.72rem;
    letter-spacing: 0.15em; color: var(--text-muted);
    text-transform: uppercase; margin-bottom: 1rem;
  }

  .post-content h1, .post-content h2, .post-content h3 {
    font-family: var(--font-display);
    color: var(--text-primary);
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .post-content h1 {
    font-size: clamp(2rem, 4.5vw, 2.75rem);
    font-weight: 600;
    margin-bottom: 1.5rem;
    line-height: 1.1;
  }
  .post-content h2 {
    font-size: 1.5rem;
    font-weight: 500;
    margin: 2.5rem 0 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }
  .post-content h3 {
    font-size: 1.2rem;
    font-weight: 500;
    margin: 2rem 0 0.75rem;
  }
  .post-content p {
    font-size: 1.05rem;
    font-weight: 300;
    color: var(--text-secondary);
    margin-bottom: 1.25rem;
  }
  .post-content strong {
    color: var(--text-primary);
    font-weight: 500;
  }
  .post-content em {
    color: var(--text-primary);
    font-style: italic;
  }
  .post-content a {
    color: var(--accent-bright);
    text-decoration: underline;
    text-decoration-color: var(--border-hover);
    text-underline-offset: 3px;
  }
  .post-content a:hover {
    text-decoration-color: var(--accent-bright);
  }
  .post-content ul, .post-content ol {
    margin: 1rem 0 1.5rem 1.5rem;
    color: var(--text-secondary);
  }
  .post-content li {
    margin-bottom: 0.5rem;
    font-weight: 300;
  }
  .post-content blockquote {
    margin: 1.5rem 0;
    padding: 0.75rem 1.5rem;
    border-left: 2px solid var(--accent);
    background: var(--bg-card);
    color: var(--text-primary);
    font-style: italic;
  }
  .post-content code {
    font-family: var(--font-mono);
    font-size: 0.88em;
    background: var(--bg-code);
    padding: 0.15em 0.4em;
    border-radius: 3px;
    color: var(--accent-bright);
  }
  .post-content pre {
    background: var(--bg-code);
    padding: 1.25rem 1.5rem;
    margin: 1.5rem 0;
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .post-content pre code {
    background: transparent;
    padding: 0;
    color: var(--text-primary);
    font-size: 0.85rem;
    line-height: 1.6;
  }
  .post-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2.5rem 0;
  }
  .post-content img {
    max-width: 100%;
    height: auto;
    margin: 1.5rem 0;
    border: 1px solid var(--border);
  }
  .post-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.5rem 0;
    font-size: 0.95rem;
  }
  .post-content th, .post-content td {
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
    text-align: left;
    color: var(--text-secondary);
    font-weight: 300;
  }
  .post-content th {
    background: var(--bg-card);
    font-weight: 500;
    color: var(--text-primary);
    font-family: var(--font-display);
  }

  .post-footer {
    margin-top: 4rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .post-footer a {
    color: var(--accent-bright);
    text-decoration: none;
  }
  .post-footer a:hover { color: var(--text-primary); }

  .loading, .error {
    padding: 3rem 0;
    text-align: center;
    color: var(--text-muted);
    font-style: italic;
  }

  footer {
    max-width: 680px; margin: 0 auto;
    padding: 3rem 2rem 4rem;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1.5rem;
    font-family: var(--font-mono); font-size: 0.7rem;
    letter-spacing: 0.08em; color: var(--text-muted);
  }
  footer a { color: var(--text-muted); text-decoration: none; }
  footer a:hover { color: var(--text-primary); }

  body::after {
    content: ''; position: fixed; top: 0; left: 0;
    width: 100%; height: 100%; pointer-events: none; z-index: 1000;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  }

  @media (max-width: 768px) {
    nav { padding: 1rem 1.25rem; }
    .nav-section { display: none; }
    main { padding: 6rem 1.25rem 3rem; }
    .post-content h1 { font-size: 1.85rem; }
    .post-content h2 { font-size: 1.3rem; }
    .post-content p { font-size: 1rem; }
    footer { padding: 2rem 1.25rem 3rem; flex-direction: column; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <a href="/" class="nav-logo">LEANDRO<span>.</span>MANIQUE</a>
    <a href="/artigos" class="nav-section">/artigos</a>
  </div>
  <a href="mailto:leandro@zeithco.com" class="nav-cta">Falar comigo</a>
</nav>

<main>
  <a href="/artigos" class="back-link">Voltar aos artigos</a>
  <div class="post-meta" id="post-meta">Carregando.</div>
  <article class="post-content" id="post-content">
    <p class="loading">Carregando artigo.</p>
  </article>
  <div class="post-footer" id="post-footer" style="display:none;">
    <a href="/artigos">Ver todos os artigos</a>
    <a href="mailto:leandro@zeithco.com?subject=Sobre%20o%20artigo">Comentar por e-mail</a>
  </div>
</main>

<footer>
  <div>© 2026 Leandro Manique · ZEITH Co. · Santa Cruz do Sul, RS</div>
  <div>
    <a href="/">Home</a> · <a href="https://zeithco.com">zeithco.com</a> · <a href="mailto:leandro@zeithco.com">leandro@zeithco.com</a>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
<script>
  function formatDate(iso) {
    const d = new Date(iso + 'T12:00:00');
    return d.toLocaleDateString('pt-BR', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function getSlug() {
    const params = new URLSearchParams(window.location.search);
    const fromQuery = params.get('slug');
    if (fromQuery) return fromQuery;
    const path = window.location.pathname;
    const match = path.match(/\/artigos\/([^\/]+)\/?$/);
    return (match && match[1] !== 'post.html') ? match[1] : null;
  }

  function showError(msg) {
    document.getElementById('post-meta').textContent = '';
    const content = document.getElementById('post-content');
    while (content.firstChild) content.removeChild(content.firstChild);
    const p = document.createElement('p');
    p.className = 'error';
    p.textContent = msg;
    content.appendChild(p);
  }

  function injectSchema(post) {
    const wordCount = post.content ? post.content.split(/\s+/).length : 0;
    const schema = {
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "@id": `https://leandromanique.com/artigos/${post.slug}#post`,
      "url": `https://leandromanique.com/artigos/${post.slug}`,
      "headline": post.title,
      "description": post.excerpt,
      "datePublished": post.date,
      "dateModified": post.date,
      "wordCount": wordCount,
      "inLanguage": "pt-BR",
      "author": {
        "@type": "Person",
        "@id": "https://leandromanique.com/#person",
        "name": "Leandro Manique",
        "url": "https://leandromanique.com/"
      },
      "publisher": {
        "@type": "Person",
        "@id": "https://leandromanique.com/#person",
        "name": "Leandro Manique"
      },
      "image": "https://leandromanique.com/imagens/leandro-canonica.png",
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": `https://leandromanique.com/artigos/${post.slug}`
      },
      "isPartOf": {
        "@type": "Blog",
        "@id": "https://leandromanique.com/artigos#blog"
      }
    };
    const script = document.createElement('script');
    script.type = 'application/ld+json';
    script.textContent = JSON.stringify(schema, null, 2);
    document.head.appendChild(script);
  }

  function injectMeta(post) {
    document.title = `${post.title}. Leandro Manique`;
    const metas = [
      { name: 'description', content: post.excerpt },
      { property: 'og:title', content: post.title },
      { property: 'og:description', content: post.excerpt },
      { property: 'og:type', content: 'article' },
      { property: 'og:url', content: `https://leandromanique.com/artigos/${post.slug}` },
      { property: 'og:image', content: 'https://leandromanique.com/imagens/leandro-canonica.png' },
      { property: 'article:author', content: 'Leandro Manique' },
      { property: 'article:published_time', content: post.date },
      { name: 'twitter:card', content: 'summary_large_image' },
      { name: 'twitter:title', content: post.title },
      { name: 'twitter:description', content: post.excerpt }
    ];
    metas.forEach(m => {
      const tag = document.createElement('meta');
      Object.entries(m).forEach(([k, v]) => tag.setAttribute(k, v));
      document.head.appendChild(tag);
    });

    let canonical = document.querySelector('link[rel="canonical"]');
    if (!canonical) {
      canonical = document.createElement('link');
      canonical.rel = 'canonical';
      document.head.appendChild(canonical);
    }
    canonical.href = `https://leandromanique.com/artigos/${post.slug}`;
  }

  function renderMarkdown(md, targetEl) {
    if (typeof marked === 'undefined' || typeof DOMPurify === 'undefined') {
      showError('Falha ao carregar dependências. Recarregue a página.');
      return;
    }
    marked.setOptions({ breaks: false, gfm: true });
    const rawHtml = marked.parse(md);
    const safeHtml = DOMPurify.sanitize(rawHtml, {
      ALLOWED_TAGS: ['h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'p', 'br', 'strong', 'em', 'b', 'i', 'a', 'ul', 'ol', 'li', 'blockquote', 'code', 'pre', 'hr', 'img', 'table', 'thead', 'tbody', 'tr', 'th', 'td'],
      ALLOWED_ATTR: ['href', 'src', 'alt', 'title', 'target', 'rel']
    });
    const tpl = document.createElement('template');
    tpl.innerHTML = safeHtml;
    while (targetEl.firstChild) targetEl.removeChild(targetEl.firstChild);
    targetEl.appendChild(tpl.content);
  }

  async function load() {
    const slug = getSlug();
    if (!slug) {
      showError('Artigo não encontrado.');
      return;
    }

    try {
      const postsRes = await fetch('/artigos/posts.json');
      const posts = await postsRes.json();
      const post = posts.find(p => p.slug === slug);
      if (!post) {
        showError('Artigo "' + slug + '" não encontrado.');
        return;
      }

      const mdRes = await fetch('/artigos/posts/' + slug + '.md');
      if (!mdRes.ok) {
        showError('Conteúdo do artigo não encontrado.');
        return;
      }
      const md = await mdRes.text();
      post.content = md;

      document.getElementById('post-meta').textContent = formatDate(post.date);
      renderMarkdown(md, document.getElementById('post-content'));
      document.getElementById('post-footer').style.display = 'flex';

      injectMeta(post);
      injectSchema(post);
    } catch (err) {
      console.error('Erro ao carregar artigo:', err);
      showError('Erro ao carregar artigo. Recarregue a página.');
    }
  }

  load();
</script>

</body>
</html>
